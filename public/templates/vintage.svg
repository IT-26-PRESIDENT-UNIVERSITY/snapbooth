<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feColorMatrix type="matrix" values="1 0 0 0 0  0 0.8 0 0 0  0 0.6 0 0 0  0 0 0 0.15 0" in="noise" result="coloredNoise"/>
      <feBlend in="SourceGraphic" in2="coloredNoise" mode="multiply"/>
    </filter>
  </defs>

  <!-- Dark film border with transparent center (evenodd punch) -->
  <path d="M0,0 H1200 V1800 H0 Z M150,50 H1050 V1750 H150 Z"
        fill="#111111" fill-rule="evenodd" filter="url(#grain)"/>

  <!-- Left film sprocket holes -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="28" y="90"   width="62" height="82" rx="10"/>
    <rect x="28" y="240"  width="62" height="82" rx="10"/>
    <rect x="28" y="390"  width="62" height="82" rx="10"/>
    <rect x="28" y="540"  width="62" height="82" rx="10"/>
    <rect x="28" y="690"  width="62" height="82" rx="10"/>
    <rect x="28" y="840"  width="62" height="82" rx="10"/>
    <rect x="28" y="990"  width="62" height="82" rx="10"/>
    <rect x="28" y="1140" width="62" height="82" rx="10"/>
    <rect x="28" y="1290" width="62" height="82" rx="10"/>
    <rect x="28" y="1440" width="62" height="82" rx="10"/>
    <rect x="28" y="1590" width="62" height="82" rx="10"/>
  </g>

  <!-- Right film sprocket holes -->
  <g fill="#ffffff" opacity="0.9">
    <rect x="1110" y="90"   width="62" height="82" rx="10"/>
    <rect x="1110" y="240"  width="62" height="82" rx="10"/>
    <rect x="1110" y="390"  width="62" height="82" rx="10"/>
    <rect x="1110" y="540"  width="62" height="82" rx="10"/>
    <rect x="1110" y="690"  width="62" height="82" rx="10"/>
    <rect x="1110" y="840"  width="62" height="82" rx="10"/>
    <rect x="1110" y="990"  width="62" height="82" rx="10"/>
    <rect x="1110" y="1140" width="62" height="82" rx="10"/>
    <rect x="1110" y="1290" width="62" height="82" rx="10"/>
    <rect x="1110" y="1440" width="62" height="82" rx="10"/>
    <rect x="1110" y="1590" width="62" height="82" rx="10"/>
  </g>

  <!-- Bottom text -->
  <text x="600" y="1710" font-family="'Courier New', monospace" font-size="36" fill="#cc9966" text-anchor="middle" letter-spacing="10" opacity="0.85">KODAK PORTRA 400</text>
  <text x="600" y="1760" font-family="'Courier New', monospace" font-size="22" fill="#886644" text-anchor="middle" letter-spacing="5" opacity="0.6">SNAPBOOTH ✦ 2024</text>
</svg>
