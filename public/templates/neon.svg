<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ff" />
      <stop offset="50%" stop-color="#f0f" />
      <stop offset="100%" stop-color="#80f" />
    </linearGradient>
  </defs>
  
  <!-- Transparent cutout with thick neon border -->
  <path d="M0,0 L1200,0 L1200,1800 L0,1800 Z M50,50 L50,1750 L1150,1750 L1150,50 Z" fill="url(#cyber-grad)" fill-rule="evenodd" opacity="0.8" />
  
  <!-- Outer glowing frame -->
  <rect x="20" y="20" width="1160" height="1760" fill="none" stroke="#0ff" stroke-width="10" filter="url(#neon-glow)" />
  <rect x="70" y="70" width="1060" height="1660" fill="none" stroke="#f0f" stroke-width="5" filter="url(#neon-glow)" />
  
  <!-- Corner accents -->
  <path d="M20,100 L20,20 L100,20" fill="none" stroke="#fff" stroke-width="15" filter="url(#neon-glow)" />
  <path d="M1180,100 L1180,20 L1100,20" fill="none" stroke="#fff" stroke-width="15" filter="url(#neon-glow)" />
  <path d="M20,1700 L20,1780 L100,1780" fill="none" stroke="#fff" stroke-width="15" filter="url(#neon-glow)" />
  <path d="M1180,1700 L1180,1780 L1100,1780" fill="none" stroke="#fff" stroke-width="15" filter="url(#neon-glow)" />

  <!-- Text -->
  <text x="600" y="1700" font-family="monospace" font-size="60" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#neon-glow)">CYBER_BOOTH_V1</text>
</svg>
