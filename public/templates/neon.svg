<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" width="1200" height="1800">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d0d2b"/>
    </linearGradient>
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background (everything EXCEPT photo area) using evenodd -->
  <path d="M0,0 H1200 V1800 H0 Z M60,60 H1140 V1720 H60 Z"
        fill="url(#cyber-grad)" fill-rule="evenodd"/>

  <!-- Neon border lines -->
  <rect x="15" y="15" width="1170" height="1770" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neon-glow)"/>
  <rect x="40" y="40" width="1120" height="1720" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#neon-glow)" opacity="0.6"/>

  <!-- Corner accents -->
  <path d="M15,80 L15,15 L80,15" fill="none" stroke="#ffffff" stroke-width="8" filter="url(#neon-glow)"/>
  <path d="M1185,80 L1185,15 L1120,15" fill="none" stroke="#ffffff" stroke-width="8" filter="url(#neon-glow)"/>
  <path d="M15,1720 L15,1785 L80,1785" fill="none" stroke="#ffffff" stroke-width="8" filter="url(#neon-glow)"/>
  <path d="M1185,1720 L1185,1785 L1120,1785" fill="none" stroke="#ffffff" stroke-width="8" filter="url(#neon-glow)"/>

  <!-- Text inside the dark frame area -->
  <text x="600" y="1760" font-family="monospace" font-size="28" font-weight="bold" fill="#00ffff" text-anchor="middle" filter="url(#neon-glow)" letter-spacing="4">CYBER_BOOTH_V1</text>
</svg>
